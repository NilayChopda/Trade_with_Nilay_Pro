name: Deploy to Render

# This workflow fires on every push to the main branch.  when the scanner
# or any code adds/updates the database file it will push to GitHub and
# the act of pushing will cause Render to build a new release.  additionally
# we call the Render deploy API explicitly in case you prefer an immediate
# trigger without waiting for the GitHub-app integration.

on:
  push:
    branches: [ main ]

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - name: Notify about the push
        run: echo "Pushed at $(date) to main, triggering Render."

      - name: Trigger Render deployment via Deploy Hook
        run: |
          curl -X POST "https://api.render.com/deploy/srv-d6cubd7fte5s73d1og9g?key=pAYFTu_4MGob"
