name: Daily NSE Scanner (Automated)

on:
  schedule:
    # Run at 9:30 AM IST (= 4:00 AM UTC) Monday to Friday
    - cron: '0 4 * * 1-5'
    # Run at 11:00 AM IST (= 5:30 AM UTC)
    - cron: '30 5 * * 1-5'
    # Run at 1:00 PM IST (= 7:30 AM UTC)
    - cron: '30 7 * * 1-5'
    # Run at 3:00 PM IST (= 9:30 AM UTC) - EOD
    - cron: '30 9 * * 1-5'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create keys.env from Secrets
        run: |
          mkdir -p backend/config
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" > backend/config/keys.env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> backend/config/keys.env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> backend/config/keys.env

      - name: Install Chromium for Selenium (Chartink Scraper)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y chromium-browser chromium-chromedriver
          export DISPLAY=:99

      - name: Run NSE Scanner (Single Cycle with Alerts)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PYTHONPATH: .
        run: |
          python -m backend.scanner.scanner_engine

      - name: Upload Scanner Results (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: scanner-db-${{ github.run_number }}
          path: backend/database/trade_with_nilay.db
          retention-days: 7

      - name: Commit Updated Database
        run: |
          git config --global user.name "TWN Scanner Bot"
          git config --global user.email "scanner@tradewithnilay.com"
          git add trade_with_nilay_prod.db || true
          git diff --staged --quiet || git commit -m "📊 Auto-scan: $(date +'%Y-%m-%d %H:%M IST')"
          git push || echo "Push skipped (no changes)"

      - name: Trigger Render Deploy
        if: github.ref == 'refs/heads/main'
        env:
          deploy_url: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$deploy_url" ]; then
            curl -X POST "$deploy_url"
          else
            # Fallback to the one provided by user if secret is not set yet
            curl -X POST "https://api.render.com/deploy/srv-d6cubd7fte5s73d1og9g?key=pAYFTu_4MGob"
          fi
